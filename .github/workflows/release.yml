name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --verbosity normal

      - name: Publish (self-contained)
        run: >
          dotnet publish src/ClaudeTracker/ClaudeTracker.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish/self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true

      - name: Publish (framework-dependent)
        run: >
          dotnet publish src/ClaudeTracker/ClaudeTracker.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output ./publish/framework-dependent
          -p:PublishSingleFile=true

      - name: Package self-contained
        run: Compress-Archive -Path ./publish/self-contained/* -DestinationPath ./ClaudeTracker-${{ github.ref_name }}-win-x64.zip

      - name: Package framework-dependent
        run: Compress-Archive -Path ./publish/framework-dependent/* -DestinationPath ./ClaudeTracker-${{ github.ref_name }}-win-x64-compact.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ClaudeTracker-${{ github.ref_name }}-win-x64.zip
            ClaudeTracker-${{ github.ref_name }}-win-x64-compact.zip
