name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tag comparison and PR lookup

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Restore dependencies
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --verbosity normal

      - name: Clean build artifacts
        run: dotnet clean --configuration Release

      - name: Publish (for Velopack installer)
        run: >
          dotnet publish src/ClaudeTracker/ClaudeTracker.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0

      - name: Publish portable (single-file)
        run: >
          dotnet publish src/ClaudeTracker/ClaudeTracker.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish-portable
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true

      - name: Publish HookBridge (self-contained)
        run: >
          dotnet publish src/ClaudeTracker.HookBridge/ClaudeTracker.HookBridge.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish-hookbridge-self-contained
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true

      - name: Publish HookBridge (framework-dependent)
        run: >
          dotnet publish src/ClaudeTracker.HookBridge/ClaudeTracker.HookBridge.csproj
          --configuration Release
          --runtime win-x64
          --no-self-contained
          --output ./publish-hookbridge-framework-dependent
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0

      - name: Bundle HookBridge into publish directories
        run: |
          Copy-Item ./publish-hookbridge-self-contained/ClaudeTracker.HookBridge.exe ./publish/
          Copy-Item ./publish-hookbridge-self-contained/ClaudeTracker.HookBridge.exe ./publish-portable/

      - name: Package portable ZIP
        run: Compress-Archive -Path ./publish-portable/* -DestinationPath ./ClaudeTracker-${{ github.ref_name }}-portable-win-x64.zip

      - name: Package HookBridge ZIPs
        run: |
          Compress-Archive -Path ./publish-hookbridge-self-contained/* -DestinationPath ./HookBridge-${{ github.ref_name }}-self-contained-win-x64.zip
          Compress-Archive -Path ./publish-hookbridge-framework-dependent/* -DestinationPath ./HookBridge-${{ github.ref_name }}-framework-dependent-win-x64.zip

      - name: Generate release notes
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          PR_BODY=""

          # Strategy 1: Check each commit between tags for an associated PR
          if [ -n "$PREV_TAG" ]; then
            for sha in $(git rev-list "$PREV_TAG"..${{ github.ref_name }}); do
              PR_BODY=$(gh api "repos/TobiiNT/ClaudeTracker/commits/$sha/pulls" --jq '.[0].body // empty' 2>/dev/null || echo "")
              if [ -n "$PR_BODY" ]; then
                break
              fi
            done
          fi

          # Strategy 2: Find most recent merged PR targeting main
          if [ -z "$PR_BODY" ]; then
            PR_BODY=$(gh api "repos/TobiiNT/ClaudeTracker/pulls?state=closed&base=main&sort=updated&direction=desc&per_page=5" \
              --jq '[.[] | select(.merged_at != null)] | .[0].body // empty' 2>/dev/null || echo "")
          fi

          if [ -n "$PR_BODY" ]; then
            # Use PR body, strip test plan section
            echo "$PR_BODY" | sed '/^## Test [Pp]lan/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba}' > release-notes.md
          else
            # Fallback: list commits since previous tag
            echo "## What's Changed" > release-notes.md
            if [ -n "$PREV_TAG" ]; then
              git log --oneline "$PREV_TAG"..${{ github.ref_name }} | head -20 | while read line; do echo "- $line"; done >> release-notes.md
            else
              git log --oneline -20 ${{ github.ref_name }} | while read line; do echo "- $line"; done >> release-notes.md
            fi
          fi
          echo "--- Release notes ---"
          cat release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        shell: bash
        run: gh release create ${{ github.ref_name }} --title "Claude Tracker ${{ github.ref_name }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download previous releases (for delta packages)
        run: >
          vpk download github
          --repoUrl https://github.com/TobiiNT/ClaudeTracker
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir ./releases
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId ClaudeTracker
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir ./publish
          --outputDir ./releases
          --icon src/ClaudeTracker/Assets/app_icon.ico

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/TobiiNT/ClaudeTracker
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir ./releases
          --tag ${{ github.ref_name }}
          --merge

      - name: Attach portable ZIP and HookBridge to release
        run: >
          gh release upload ${{ github.ref_name }}
          ./ClaudeTracker-${{ github.ref_name }}-portable-win-x64.zip
          ./HookBridge-${{ github.ref_name }}-self-contained-win-x64.zip
          ./HookBridge-${{ github.ref_name }}-framework-dependent-win-x64.zip
          --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
