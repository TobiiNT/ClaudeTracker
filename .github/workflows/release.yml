name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Restore dependencies
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --verbosity normal

      - name: Publish (for Velopack installer)
        run: >
          dotnet publish src/ClaudeTracker/ClaudeTracker.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0

      - name: Publish portable (single-file)
        run: >
          dotnet publish src/ClaudeTracker/ClaudeTracker.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish-portable
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:AssemblyVersion=${{ steps.version.outputs.VERSION }}.0
          -p:FileVersion=${{ steps.version.outputs.VERSION }}.0
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true

      - name: Package portable ZIP
        run: Compress-Archive -Path ./publish-portable/* -DestinationPath ./ClaudeTracker-${{ github.ref_name }}-portable-win-x64.zip

      - name: Create GitHub Release with auto-generated notes
        run: gh release create ${{ github.ref_name }} --title "Claude Tracker ${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download previous releases (for delta packages)
        run: >
          vpk download github
          --repoUrl https://github.com/TobiiNT/ClaudeTracker
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir ./releases
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId ClaudeTracker
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir ./publish
          --outputDir ./releases
          --icon src/ClaudeTracker/Assets/app_icon.ico

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/TobiiNT/ClaudeTracker
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir ./releases
          --tag ${{ github.ref_name }}
          --merge

      - name: Attach portable ZIP to release
        run: gh release upload ${{ github.ref_name }} ./ClaudeTracker-${{ github.ref_name }}-portable-win-x64.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
