name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open ClaudeTracker
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: Found in Settings > About.
      placeholder: "e.g., 1.1.0"
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows Version
      description: "Run `winver` to check."
      placeholder: "e.g., Windows 11 23H2"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - Installer (Setup.exe)
        - Portable ZIP
        - Built from source

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that might help.
